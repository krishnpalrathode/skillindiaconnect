  # ── Candidate: documents ──────────────────────────────────────────────────────
  /candidates/me/documents/presign:
    post:
      operationId: postCandidateMeDocumentsPresign
      tags: [candidate]
      summary: Get a presigned R2 upload URL
      description: |
        Issues a short-lived presigned PUT URL for direct R2 upload.
        The client PUTs the file to `uploadUrl`, then calls
        `POST /candidates/me/documents/confirm` with the `key`.

        **Accepted types and size limits:**
        - `PASSPORT`: 10 MB max; image/jpeg, image/png, application/pdf
        - `EXPERIENCE_CERT`: 5 MB max; application/pdf
        - `EDUCATIONAL_CERT`: 5 MB max; application/pdf

        `WORKING_VIDEO` is **Phase 2 only** — not accepted at MVP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, fileName, mimeType, sizeBytes]
              properties:
                type:
                  $ref: '#/components/schemas/DocumentType'
                fileName:
                  type: string
                  example: passport.pdf
                mimeType:
                  type: string
                  example: application/pdf
                sizeBytes:
                  type: integer
                  description: File size in bytes; validated against per-type limits
      responses:
        '200':
          description: Presigned URL ready
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [uploadUrl, key, expiresInSeconds]
                    properties:
                      uploadUrl:
                        type: string
                        format: uri
                        description: Presigned PUT URL; client PUTs the file directly
                      key:
                        type: string
                        description: R2 object key; pass to /documents/confirm
                      expiresInSeconds:
                        type: integer
                        example: 300
        '422':
          description: Invalid file type or size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidType:
                  value:
                    type: about:blank
                    title: Invalid file type
                    status: 422
                    detail: Only JPEG, PNG, and PDF files are accepted for PASSPORT.
                    code: INVALID_FILE_TYPE
                tooLarge:
                  value:
                    type: about:blank
                    title: File too large
                    status: 422
                    detail: PASSPORT documents must be under 10 MB.
                    code: FILE_TOO_LARGE

  /candidates/me/documents/confirm:
    post:
      operationId: postCandidateMeDocumentsConfirm
      tags: [candidate]
      summary: Confirm an uploaded document
      description: |
        After the client successfully PUTs the file to the presigned URL, calls
        this endpoint to record the document in the database.

        The API performs a HEAD check on the R2 key to confirm the upload succeeded.
        If the key is not found, returns `422 UPLOAD_NOT_FOUND`.

        For PASSPORT documents, `expiryDate` is accepted (and required) here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                  description: R2 key returned by /documents/presign
                expiryDate:
                  type: string
                  format: date
                  description: Required for PASSPORT type
      responses:
        '200':
          description: Document recorded
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/CandidateDocument'
        '422':
          description: Upload not found (HEAD check failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Upload not found
                status: 422
                detail: The uploaded file was not found in storage. Please try uploading again.
                code: UPLOAD_NOT_FOUND

  # ── Candidate: complete onboarding ────────────────────────────────────────────
  /candidates/me/complete-onboarding:
    post:
      operationId: postCandidateMeCompleteOnboarding
      tags: [candidate]
      summary: Mark onboarding as complete
      description: |
        Marks the candidate's onboarding step as done and returns the current
        completion percentage.

        **SOFT-BLOCK:** This endpoint succeeds even if mandatory documents are
        missing or completion is below the apply threshold. The apply gate
        (≥ 70 % completion + mandatory docs + valid passport) is enforced
        separately at job-apply time (Sprint 4), not here.
      responses:
        '200':
          description: Onboarding marked complete
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [completionPct]
                    properties:
                      completionPct:
                        type: integer
                        minimum: 0
                        maximum: 100

  # ── Account: self-deletion ────────────────────────────────────────────────────
  /account:
    delete:
      operationId: deleteAccount
      tags: [candidate]
      summary: Request account deletion
      description: |
        Sets the account status to `PENDING_DELETION` and schedules a 30-day
        purge job. Returns the deletion due date.

        Financial records (orders, payments, subscriptions, invoices) and
        `audit_logs` are never cascade-deleted per the platform invariants.
      responses:
        '202':
          description: Deletion scheduled
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [deletionDueAt]
                    properties:
                      deletionDueAt:
                        type: string
                        format: date-time

  # ── Resume ────────────────────────────────────────────────────────────────────
  /candidates/me/resume:
    get:
      operationId: getCandidateMeResume
      tags: [resume]
      summary: Get resume settings and last-rendered timestamp
      description: >
        Returns the candidate's resume rendering settings and the timestamp of
        the last successful PDF generation. Built in Sprint 7; mocked in S1.
      responses:
        '200':
          description: Resume info
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [settings]
                    properties:
                      settings:
                        $ref: '#/components/schemas/ResumeSettings'
                      lastRenderedAt:
                        type: [string, "null"]
                        format: date-time

  /candidates/me/resume/settings:
    patch:
      operationId: patchCandidateMeResumeSettings
      tags: [resume]
      summary: Update resume rendering settings
      description: >
        Updates which fields appear in the PDF. Hidden fields
        (showPassportNumber = false, showReligion = false) must be absent from
        PDF bytes, not just hidden in preview (enforced at generation time).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeSettings'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ResumeSettings'

  /candidates/me/resume/generate:
    post:
      operationId: postCandidateMeResumeGenerate
      tags: [resume]
      summary: Enqueue a resume PDF generation
      description: >
        Enqueues an async PDF generation job (BullMQ). Returns a `generationId`
        that can be used to poll status. Built in Sprint 7.
      responses:
        '202':
          description: Generation enqueued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [generationId]
                    properties:
                      generationId:
                        type: string
                        format: uuid

  /candidates/me/resume/download:
    get:
      operationId: getCandidateMeResumeDownload
      tags: [resume]
      summary: Get a signed download URL for the candidate's resume PDF
      description: >
        Returns a short-expiry signed R2 URL for the most recently generated
        PDF. Every URL issuance is audited. Built in Sprint 7.
      responses:
        '200':
          description: Signed download URL
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [url, expiresInSeconds]
                    properties:
                      url:
                        type: string
                        format: uri
                      expiresInSeconds:
                        type: integer
                        example: 300
        '404':
          description: No resume generated yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /candidates/me/resume/send-whatsapp:
    post:
      operationId: postCandidateMeResumeSendWhatsapp
      tags: [resume]
      summary: Send resume PDF via WhatsApp to the candidate
      description: |
        Sends the candidate's resume PDF to their own verified WhatsApp number.
        Rate-limited: 5 sends / day / candidate.

        **409 WHATSAPP_NOT_CAPABLE** — returned when the candidate's
        `whatsappCapable = false`. In that case the client should fall back to
        `POST /candidates/me/resume/send-email`.
      responses:
        '202':
          description: Send enqueued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [sent]
                    properties:
                      sent:
                        type: boolean
                        example: true
        '409':
          description: Candidate is not WhatsApp capable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: WhatsApp not capable
                status: 409
                detail: This account is not linked to a WhatsApp number. Please use email delivery.
                code: WHATSAPP_NOT_CAPABLE
        '429':
          description: Daily send limit reached (5/day)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /candidates/me/resume/send-email:
    post:
      operationId: postCandidateMeResumeSendEmail
      tags: [resume]
      summary: Send resume PDF via email to the candidate
      description: |
        Sends the candidate's resume PDF via AWS SES to their own registered
        account email address.

        **HARD RULE:** sends ONLY to the candidate's account email — never to
        an arbitrary address supplied in the request body. No `to` field is
        accepted. Rate-limited: 5 sends / day / candidate (shared with WhatsApp).
      responses:
        '202':
          description: Email enqueued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [sent]
                    properties:
                      sent:
                        type: boolean
                        example: true
        '429':
          description: Daily send limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

