openapi: 3.1.0
info:
  title: SkillIndiaConnect API
  version: 0.2.0
  description: |
    Production blue-collar recruitment platform connecting skilled workers in India
    with employers in the Gulf and locally.

    **Contract freeze rule:** After the initial freeze merge, contract changes require
    a spec edit + `pnpm contract:generate` + a versioned amendment description in the
    commit / PR. Frontend and backend tracks build in parallel against this contract.

    **Base URL:** All versioned endpoints are under `/api/v1`. The `/health` endpoint
    is unversioned and served at the root (see path entry for details).

    **Auth:** JWT bearer token (`Authorization: Bearer <token>`). Access tokens are
    short-lived (15 min). Refresh tokens are delivered as an HttpOnly cookie
    (`sic_refresh`) via `POST /auth/refresh`. Public endpoints carry `security: []`.

    **S2 additions (Sprint 2):** Employer identity, jobs + lifecycle, public job
    search, candidate notifications, admin settings + employer approval.

servers:
  - url: /api/v1
    description: Versioned API

tags:
  - name: health
    description: Unversioned liveness/readiness probe
  - name: auth
    description: Authentication — email/password, Google OAuth, OTP login, password reset
  - name: candidate
    description: Candidate profile, onboarding, documents, and account management
  - name: notifications
    description: In-app notifications for candidates (S2)
  - name: resume
    description: Resume settings, generation, download, and delivery (Sprint 7)
  - name: employer
    description: >
      Employer company registration, dashboard, and job management (S2 full).
      Candidate profile views in employer context → S3.
  - name: jobs
    description: >
      Job listings — public search and detail (S2), employer CRUD + lifecycle (S2),
      candidate save (S2). Apply flow → S4.
  - name: payments
    description: Billing plans, checkout, subscription (Sprint 5)
  - name: admin
    description: >
      Admin — employer approval + platform settings (S2 full). Full moderation
      (candidates, jobs, applications, roles, logs) → S6.

security:
  - bearerAuth: []

# ─── Components ──────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Short-lived JWT access token issued by login / signup / OAuth / OTP-verify.
        Deliver in `Authorization: Bearer <token>`. Refresh via `POST /auth/refresh`
        (uses the `sic_refresh` HttpOnly cookie, not this header).

  parameters:
    CursorParam:
      name: cursor
      in: query
      description: Opaque keyset cursor for cursor-paginated feeds
      schema:
        type: string

    LimitParam:
      name: limit
      in: query
      description: Page size for cursor-paginated feeds (default 20, max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    PageParam:
      name: page
      in: query
      description: 1-based page number for offset-paginated admin tables
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      description: Items per page for offset-paginated admin tables (default 20, max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SortParam:
      name: sort
      in: query
      description: >
        Sort expression in the format `field:asc` or `field:desc`.
        Allowed fields are whitelisted per endpoint.
      schema:
        type: string
        pattern: '^[a-zA-Z]+:(asc|desc)$'

  schemas:

    # ── Error envelope (RFC 7807-style) ────────────────────────────────────────
    Error:
      type: object
      required: [type, title, status, detail, code]
      properties:
        type:
          type: string
          description: URI reference identifying the problem type
          example: about:blank
        title:
          type: string
          description: Human-readable summary (localizable)
          example: Email already registered
        status:
          type: integer
          description: HTTP status code
          example: 409
        detail:
          type: string
          description: Human-readable explanation (localizable)
          example: An account with this email address already exists.
        code:
          type: string
          description: >
            Machine-readable error code — the stable contract field.
            Examples: EMAIL_TAKEN, INVALID_CREDENTIALS, ACCOUNT_SUSPENDED,
            INVALID_OTP, PHONE_NOT_ON_WHATSAPP, PROFILE_INCOMPLETE,
            MANDATORY_DOCS_MISSING, ILLEGAL_TRANSITION, EMPLOYER_NOT_APPROVED,
            WORKER_PROTECTION_VIOLATION, JOB_QUOTA_EXCEEDED, CORE_RULE_FORBIDDEN,
            NOT_IMPLEMENTED.
          example: EMAIL_TAKEN
        meta:
          type: object
          description: >
            Additional context. Validation errors carry `meta.errors[]` with
            per-field machine codes. Publish errors carry `meta.violations[]`
            or `meta.planLimit`.
          additionalProperties: true

    # ── Domain enums ────────────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [CANDIDATE, EMPLOYER, ADMIN, SUPER_ADMIN]

    UserStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, PENDING_DELETION]

    MaritalStatus:
      type: string
      enum: [SINGLE, MARRIED, DIVORCED, WIDOWED]

    ExperienceType:
      type: string
      enum: [INDIA, FOREIGN]

    DocumentType:
      type: string
      enum: [PASSPORT, EXPERIENCE_CERT, EDUCATIONAL_CERT]
      description: >
        Document types accepted at MVP. WORKING_VIDEO is deferred to Phase 2
        and MUST NOT be submitted via POST /candidates/me/documents/presign.

    DocumentStatus:
      type: string
      enum: [PENDING, VERIFIED, REJECTED]

    # ── Employer enums (S2) ─────────────────────────────────────────────────────
    CompanyType:
      type: string
      enum: [LOCAL, FOREIGN]
      description: LOCAL = Indian company hiring domestically; FOREIGN = Gulf/overseas employer.

    CompanyStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, SUSPENDED]
      description: >
        Lifecycle of an employer company profile. New registrations start PENDING.
        An admin with `employers.approve_reject` moves them to APPROVED or REJECTED.
        APPROVED employers can post jobs. SUSPENDED employers cannot post; their
        active jobs are paused automatically.

    EmployeeRange:
      type: string
      enum: ['1-10', '11-50', '51-200', '201-500', '500+']

    # ── Job enums (S2) ──────────────────────────────────────────────────────────
    JobStatus:
      type: string
      enum: [DRAFT, ACTIVE, PAUSED, ARCHIVED]
      description: >
        DRAFT — visible only to the owning employer, not in public search.
        ACTIVE — live in public search; candidates can save and apply (S4).
        PAUSED — hidden from public search; can be resumed to ACTIVE.
        ARCHIVED — permanent, read-only; cannot be un-archived.

    JobMarket:
      type: string
      enum: [GULF, LOCAL]

    GenderPreference:
      type: string
      enum: [MALE, FEMALE, ANY]

    # ── Notification enums (S2) ─────────────────────────────────────────────────
    NotificationType:
      type: string
      enum: [APPLICATION_UPDATE, JOB_MATCH, PROFILE_REMINDER, DOCUMENT_STATUS, SYSTEM]

    # ── Settings enums (S2) ─────────────────────────────────────────────────────
    SettingGroup:
      type: string
      enum: [WORKER_PROTECTION, COMPLETION, APPLICATION, PLATFORM]
      description: >
        Maps to the tabs on the Admin Settings screen (Screen 28).
        WORKER_PROTECTION settings are core rules — only SUPER_ADMIN may update them.

    # ── Shared objects ──────────────────────────────────────────────────────────
    UserSummary:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    AuthTokenResponse:
      type: object
      required: [user, accessToken]
      description: >
        Returned on successful signup, email/password login, Google OAuth, and
        OTP login. The `accessToken` (JWT, 15 min) must be stored by the client.
        A long-lived refresh token is delivered as the `sic_refresh` HttpOnly
        cookie (path `/api/v1/auth`) — do NOT try to read or send it manually.
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: Short-lived JWT access token (15 min)

    # ── Candidate schemas ────────────────────────────────────────────────────────
    WorkExperience:
      type: object
      required: [id, type]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/ExperienceType'
        country:
          type: string
          example: UAE
        companyName:
          type: string
        role:
          type: string
        years:
          type: integer
          minimum: 0
        months:
          type: integer
          minimum: 0
          maximum: 11
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    CandidateSkill:
      type: object
      required: [id, name]
      description: >
        Only the first 3 skills contribute to the match score.
        More than 3 skills can be stored but additional ones do not score.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    CandidateDocument:
      type: object
      required: [id, type, key, status, uploadedAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/DocumentType'
        key:
          type: string
          description: R2 storage key — use signed download URLs; never expose raw keys to untrusted callers
        status:
          $ref: '#/components/schemas/DocumentStatus'
        uploadedAt:
          type: string
          format: date-time
        expiryDate:
          type: string
          format: date
          description: Passport expiry date (PASSPORT type only; set during confirm step)

    CandidateProfile:
      type: object
      required: [id, email, role]
      description: |
        Candidate profile shape. **Privacy rules (viewer-aware DTOs):**
        - `phone` is omitted in employer/admin contexts when `showPhone = false` (default off).
        - `religion` is omitted in employer/admin contexts when `showReligion = false` (default off).
        - Self-view (`GET /candidates/me`) always includes both fields regardless of toggles.
        - Internal application notes are NEVER serialized to employer or candidate contexts.
        - `passportNumber` is only in the PDF renderer context and only when `showPassportNumber = true`.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        fullName:
          type: string
        fatherName:
          type: string
        dob:
          type: string
          format: date
        phone:
          type: string
          description: Toggle-controlled in non-self contexts (showPhone). Always present in self-view.
          example: '+919876543210'
        phoneVerifiedAt:
          type: [string, "null"]
          format: date-time
        whatsappCapable:
          type: [boolean, "null"]
          description: Set to true when OTP verification succeeds via WhatsApp channel
        maritalStatus:
          $ref: '#/components/schemas/MaritalStatus'
        religion:
          type: string
          description: Toggle-controlled in non-self contexts (showReligion). Always present in self-view.
        languages:
          type: array
          items:
            type: string
        jobCategoryId:
          type: [string, "null"]
          format: uuid
        currentLocation:
          type: string
        nationality:
          type: string
        noticePeriod:
          type: integer
          description: Notice period in days
        completionPct:
          type: integer
          minimum: 0
          maximum: 100
          description: Server-computed, single-source profile completion percentage
        profileVisible:
          type: boolean
          default: true
        isAvailable:
          type: boolean
          default: true
        salaryExpectationMin:
          type: [integer, "null"]
        salaryExpectationMax:
          type: [integer, "null"]
        salaryExpectationCurrency:
          type: string
          default: INR
        experiences:
          type: array
          items:
            $ref: '#/components/schemas/WorkExperience'
        skills:
          type: array
          items:
            $ref: '#/components/schemas/CandidateSkill'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/CandidateDocument'
        status:
          $ref: '#/components/schemas/UserStatus'
        createdAt:
          type: string
          format: date-time

    CompletionSection:
      type: object
      required: [key, label, pct, complete]
      properties:
        key:
          type: string
        label:
          type: string
        pct:
          type: integer
          minimum: 0
          maximum: 100
        complete:
          type: boolean

    CompletionResult:
      type: object
      required: [pct, sections, canApply, missingForApply]
      description: >
        Server-computed, single-source profile completion. The `canApply` gate
        requires pct ≥ threshold AND all mandatory documents present AND passport
        not expired. This is enforced at apply time (Sprint 4), not at
        complete-onboarding time.
      properties:
        pct:
          type: integer
          minimum: 0
          maximum: 100
        sections:
          type: array
          items:
            $ref: '#/components/schemas/CompletionSection'
        canApply:
          type: boolean
        missingForApply:
          type: array
          items:
            type: string
          description: Human-readable list of items blocking the apply gate

    ResumeSettings:
      type: object
      description: >
        Resume PDF rendering settings. Hidden fields (showPassportNumber = false,
        showReligion = false) must be ABSENT FROM THE PDF BYTES, not merely hidden
        in preview. Enforced at PDF generation time (Sprint 7).
      properties:
        language:
          type: string
          default: en
          example: en
        showPhone:
          type: boolean
          default: true
        showReligion:
          type: boolean
          default: false
        showFatherName:
          type: boolean
          default: false
        showPassportNumber:
          type: boolean
          default: false

    # ── Employer schemas (S2) ───────────────────────────────────────────────────
    Company:
      type: object
      required: [id, name, type, status, createdAt]
      description: |
        Employer company profile. Returned to the owning employer and to admins.
        Never returned on public job endpoints — use `JobCard.companyName` there.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: '#/components/schemas/CompanyType'
        status:
          $ref: '#/components/schemas/CompanyStatus'
        registrationNumber:
          type: string
        industryType:
          type: string
        phone:
          type: string
        location:
          type: string
        website:
          type: string
          format: uri
        employeeRange:
          $ref: '#/components/schemas/EmployeeRange'
        languagePref:
          type: string
          enum: [en, hi, ar]
          default: en
        description:
          type: string
        registrationCertKey:
          type: [string, "null"]
          description: R2 key for the uploaded registration certificate document
        rejectionReason:
          type: [string, "null"]
          description: Populated after admin rejection; visible to the employer
        createdAt:
          type: string
          format: date-time
        approvedAt:
          type: [string, "null"]
          format: date-time

    EmployerDashboardKpi:
      type: object
      required: [activeJobs, totalApplications, shortlisted, selected]
      properties:
        activeJobs:
          type: integer
        totalApplications:
          type: integer
        shortlisted:
          type: integer
        selected:
          type: integer

    EmployerDashboard:
      type: object
      required: [kpis, recentJobs, recentApplicants]
      description: >
        Employer dashboard summary (Screen 15). `recentApplicants` applies
        viewer-aware DTO masking — phone and religion follow candidate privacy toggles.
      properties:
        kpis:
          $ref: '#/components/schemas/EmployerDashboardKpi'
        recentJobs:
          type: array
          items:
            $ref: '#/components/schemas/JobCard'
        recentApplicants:
          type: array
          items:
            $ref: '#/components/schemas/CandidateProfile'

    # ── Job schemas (S2) ────────────────────────────────────────────────────────
    Job:
      type: object
      required: [id, title, status, market, location, salaryCurrency, accommodation, healthInsurance, transportation, companyId, companyName, createdAt]
      description: |
        Full internal job schema — returned to the owning employer and admins only.
        **Never return this schema on public endpoints** — use `JobCard` or `JobDetail`.

        **Publish-time enforcement order** (documented here, enforced at `POST /jobs/{id}/publish`):
        1. `EMPLOYER_NOT_APPROVED` (403) — company.status must be APPROVED.
        2. `WORKER_PROTECTION_VIOLATION` (422) — accommodation, healthInsurance, and
           transportation must all be true. `meta.violations[]` lists which failed.
        3. `JOB_QUOTA_EXCEEDED` (422) — Free plan: max 1 ACTIVE job. `meta.planLimit = 1`.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        market:
          $ref: '#/components/schemas/JobMarket'
        location:
          type: string
        description:
          type: string
        categoryId:
          type: [string, "null"]
          format: uuid
        salaryMin:
          type: [integer, "null"]
          minimum: 0
        salaryMax:
          type: [integer, "null"]
          minimum: 0
        salaryCurrency:
          type: string
          example: AED
        accommodation:
          type: boolean
          description: Must be true to publish — worker-protection rule enforced at publish time
        healthInsurance:
          type: boolean
          description: Must be true to publish — worker-protection rule enforced at publish time
        transportation:
          type: boolean
          description: Must be true to publish — worker-protection rule enforced at publish time
        workConditions:
          type: string
        requirements:
          type: array
          items:
            type: string
        experienceRequiredYears:
          type: [integer, "null"]
          minimum: 0
        vacancies:
          type: [integer, "null"]
          minimum: 1
        genderPreference:
          $ref: '#/components/schemas/GenderPreference'
        companyId:
          type: string
          format: uuid
          description: Internal — not returned on public endpoints
        companyName:
          type: string
          description: Denormalized for display
        createdAt:
          type: string
          format: date-time
        publishedAt:
          type: [string, "null"]
          format: date-time
        archivedAt:
          type: [string, "null"]
          format: date-time

    JobCard:
      type: object
      required: [id, title, market, location, salaryCurrency, accommodation, healthInsurance, transportation, companyName, createdAt]
      description: |
        **Public search-result shape.** Deliberately excludes internal employer fields
        (`companyId`, employer PII, internal metadata). Only ACTIVE jobs appear in
        public feeds (`GET /jobs`).

        `isSaved` is populated for authenticated candidate callers; `null` for
        unauthenticated (SSR / crawler) requests.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        market:
          $ref: '#/components/schemas/JobMarket'
        location:
          type: string
        categoryId:
          type: [string, "null"]
          format: uuid
        salaryMin:
          type: [integer, "null"]
          minimum: 0
        salaryMax:
          type: [integer, "null"]
          minimum: 0
        salaryCurrency:
          type: string
          example: AED
        accommodation:
          type: boolean
        healthInsurance:
          type: boolean
        transportation:
          type: boolean
        companyName:
          type: string
        createdAt:
          type: string
          format: date-time
        publishedAt:
          type: [string, "null"]
          format: date-time
        isSaved:
          type: [boolean, "null"]
          description: >
            Whether the authenticated candidate has saved this job.
            null for unauthenticated callers.

    JobDetail:
      allOf:
        - $ref: '#/components/schemas/JobCard'
        - type: object
          description: |
            **Public job detail page.** Extends `JobCard` with full description,
            requirements, work conditions, and up to 5 similar jobs.
            No `companyId` or other internal/employer-PII fields.
          properties:
            description:
              type: string
            requirements:
              type: array
              items:
                type: string
            workConditions:
              type: string
            experienceRequiredYears:
              type: [integer, "null"]
              minimum: 0
            vacancies:
              type: [integer, "null"]
              minimum: 1
            genderPreference:
              $ref: '#/components/schemas/GenderPreference'
            similarJobs:
              type: array
              items:
                $ref: '#/components/schemas/JobCard'
              description: Up to 5 similar active jobs in the same market/category.

    # ── Notification schemas (S2) ───────────────────────────────────────────────
    Notification:
      type: object
      required: [id, type, title, body, read, createdAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
        body:
          type: string
        read:
          type: boolean
        readAt:
          type: [string, "null"]
          format: date-time
        relatedEntityId:
          type: string
          description: ID of the related job or application (if applicable)
        relatedEntityType:
          type: string
          enum: [job, application]
        createdAt:
          type: string
          format: date-time

    # ── Settings schemas (S2) ───────────────────────────────────────────────────
    Setting:
      type: object
      required: [key, group, label, value, isCoreRule]
      description: |
        Platform configuration setting. Settings where `isCoreRule = true` (the
        WORKER_PROTECTION group) may only be updated by SUPER_ADMIN — ADMIN callers
        receive 403 `CORE_RULE_FORBIDDEN` for those keys.
      properties:
        key:
          type: string
          description: Machine-readable unique key (e.g. REQUIRE_ACCOMMODATION)
        group:
          $ref: '#/components/schemas/SettingGroup'
        label:
          type: string
          description: Human-readable label for the admin UI
        description:
          type: string
        value:
          description: >
            The current value. Type varies by key: boolean for flags, integer
            for numeric limits, string for text settings.
        isCoreRule:
          type: boolean
          description: If true, only SUPER_ADMIN may update this setting
        updatedAt:
          type: [string, "null"]
          format: date-time
        updatedBy:
          type: [string, "null"]
          description: User ID of the last updater

# ─── Paths ───────────────────────────────────────────────────────────────────

paths:

  # ── Health (unversioned — path is /health at root, NOT under /api/v1) ──────
  /health:
    servers:
      - url: /
        description: Root — health is unversioned
    get:
      operationId: getHealth
      tags: [health]
      summary: Liveness probe
      description: >
        Returns 200 when the API process is up. Used by load balancers and
        container orchestrators. No authentication required.
      security: []
      responses:
        '200':
          description: API process is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  # ── Auth: signup ─────────────────────────────────────────────────────────────
  /auth/signup:
    post:
      operationId: postAuthSignup
      tags: [auth]
      summary: Register a new user account
      description: >
        Creates a new CANDIDATE or EMPLOYER account with email + password.
        Returns an access token and sets the `sic_refresh` HttpOnly cookie.
        Rate-limited: 5 requests / 60 s per IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role, acceptedTerms]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: Must meet the strength policy (length, mixed case, digit/symbol)
                role:
                  type: string
                  enum: [CANDIDATE, EMPLOYER]
                acceptedTerms:
                  type: boolean
                  description: Must be true; request rejected if false
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/AuthTokenResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Email already registered
                status: 409
                detail: An account with this email already exists.
                code: EMAIL_TAKEN
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Validation failed
                status: 422
                detail: One or more fields are invalid.
                code: VALIDATION_ERROR
                meta:
                  errors:
                    - field: email
                      code: INVALID_EMAIL

  # ── Auth: login ──────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: postAuthLogin
      tags: [auth]
      summary: Email + password login
      description: >
        Authenticates with email and password. Returns an access token and sets
        the `sic_refresh` HttpOnly cookie. Rate-limited: 5 requests / 60 s per IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Bad credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid credentials
                status: 401
                detail: Email or password is incorrect.
                code: INVALID_CREDENTIALS
        '403':
          description: Account suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Account suspended
                status: 403
                detail: Your account has been suspended.
                code: ACCOUNT_SUSPENDED

  # ── Auth: Google OAuth ────────────────────────────────────────────────────────
  /auth/google:
    get:
      operationId: getAuthGoogle
      tags: [auth]
      summary: Initiate Google OAuth flow
      description: >
        Redirects the browser to Google's OAuth consent screen. Candidates only
        — employers and admins MUST use email/password.
        The callback URL is `GET /auth/google/callback`.
      security: []
      responses:
        '302':
          description: Redirect to Google OAuth

  /auth/google/callback:
    get:
      operationId: getAuthGoogleCallback
      tags: [auth]
      summary: Google OAuth callback
      description: |
        Handles the Google OAuth callback. On success:
        1. Sets the `sic_refresh` HttpOnly cookie.
        2. Redirects to `{WEB_APP_URL}/auth/callback` (no token in the URL).

        **Error codes:**
        - `GOOGLE_NOT_ALLOWED` (403) — the email is registered as employer/admin;
          redirected to the error page with `?error=GOOGLE_NOT_ALLOWED`.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to web app callback URL
        '403':
          description: Google sign-in not allowed for this email/role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Google sign-in not allowed
                status: 403
                detail: This email is registered as an employer or admin — use email/password.
                code: GOOGLE_NOT_ALLOWED

  # ── Auth: refresh ────────────────────────────────────────────────────────────
  /auth/refresh:
    post:
      operationId: postAuthRefresh
      tags: [auth]
      summary: Rotate the refresh token and issue a new access token
      description: >
        Reads the `sic_refresh` HttpOnly cookie. Issues a new access token and
        rotates the refresh token (old token is revoked). On TOKEN_REUSE, all
        sessions for the user are wiped (token-family rotation strategy).
      security: []
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [accessToken]
                    properties:
                      accessToken:
                        type: string
        '401':
          description: Refresh token missing, invalid, or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid:
                  value:
                    type: about:blank
                    title: Invalid refresh token
                    status: 401
                    detail: Refresh token is missing or expired.
                    code: INVALID_REFRESH
                reuse:
                  value:
                    type: about:blank
                    title: Token reuse detected
                    status: 401
                    detail: All sessions have been revoked due to suspected token theft.
                    code: TOKEN_REUSE

  # ── Auth: logout ─────────────────────────────────────────────────────────────
  /auth/logout:
    post:
      operationId: postAuthLogout
      tags: [auth]
      summary: Revoke the current session
      description: >
        Blacklists the current access token JTI (until expiry) and revokes the
        `sic_refresh` cookie. Clears the cookie from the response.
        Idempotent — always returns 204.
      responses:
        '204':
          description: Session revoked

  # ── Auth: OTP send (phone verification) ──────────────────────────────────────
  /auth/otp/send:
    post:
      operationId: postAuthOtpSend
      tags: [auth]
      summary: Send a phone-verification OTP
      description: |
        Sends a one-time password to the given phone number via WhatsApp for the
        purpose of **phone verification** during candidate onboarding.

        **Rate limits:** 5 sends / hour / phone number.

        **409 PHONE_NOT_ON_WHATSAPP** — returned when the number is valid but
        not reachable via the WhatsApp channel.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  description: E.164 phone number
                  example: '+919876543210'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [sent]
                    properties:
                      sent:
                        type: boolean
                        example: true
        '409':
          description: Phone number is not reachable via WhatsApp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Phone not on WhatsApp
                status: 409
                detail: This number is not reachable via WhatsApp. Please try a different number.
                code: PHONE_NOT_ON_WHATSAPP
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Too many requests
                status: 429
                detail: OTP send limit reached. Try again in an hour.
                code: RATE_LIMIT_EXCEEDED

  # ── Auth: OTP verify (phone verification) ────────────────────────────────────
  /auth/otp/verify:
    post:
      operationId: postAuthOtpVerify
      tags: [auth]
      summary: Verify the phone-verification OTP
      description: |
        Verifies a `purpose = PHONE_VERIFY` OTP for the caller's candidate profile.
        On success, sets `phoneVerifiedAt` and `whatsappCapable` on the candidate row.

        **401 INVALID_OTP** covers: wrong OTP, expired OTP, and maximum-attempts exceeded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone:
                  type: string
                  example: '+919876543210'
                otp:
                  type: string
                  example: '123456'
      responses:
        '200':
          description: Phone verified
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [phoneVerified, whatsappCapable]
                    properties:
                      phoneVerified:
                        type: boolean
                        example: true
                      whatsappCapable:
                        type: boolean
                        example: true
        '401':
          description: Invalid, expired, or over-attempted OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid OTP
                status: 401
                detail: OTP is incorrect, expired, or too many attempts.
                code: INVALID_OTP

  # ── Auth: OTP login — start (enumeration-safe) ───────────────────────────────
  /auth/login/phone/start:
    post:
      operationId: postAuthLoginPhoneStart
      tags: [auth]
      summary: Start OTP-based phone login
      description: |
        Initiates OTP-based login for an existing candidate account.

        **ENUMERATION-SAFE: always returns 200 regardless of whether a verified
        candidate exists for the phone number.**

        Internal behavior: if a CANDIDATE with a VERIFIED phone matching `phone`
        exists → sends a `purpose = LOGIN` OTP via WhatsApp. Otherwise → silent no-op.

        **OTP login is for existing candidates only. It never creates accounts.**
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  example: '+919876543210'
      responses:
        '200':
          description: Always returned (enumeration-safe)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: If an account exists, an OTP has been sent.
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Auth: OTP login — verify ──────────────────────────────────────────────────
  /auth/login/phone/verify:
    post:
      operationId: postAuthLoginPhoneVerify
      tags: [auth]
      summary: Verify OTP and issue tokens for phone login
      description: |
        Verifies a `purpose = LOGIN` OTP and, on success, issues an access token
        and sets the `sic_refresh` HttpOnly cookie.

        **Candidates only.** Non-candidate callers always receive 401 INVALID_OTP
        (to preserve enumeration safety).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone:
                  type: string
                  example: '+919876543210'
                otp:
                  type: string
                  example: '123456'
      responses:
        '200':
          description: OTP verified — tokens issued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Invalid, expired, or over-attempted OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid OTP
                status: 401
                detail: OTP is incorrect, expired, or too many attempts.
                code: INVALID_OTP

  # ── Auth: password reset ──────────────────────────────────────────────────────
  /auth/forgot-password:
    post:
      operationId: postAuthForgotPassword
      tags: [auth]
      summary: Request a password-reset link
      description: |
        Sends a password-reset link to the email via AWS SES — **if the email
        exists**. Always returns 200 regardless (enumeration-safe).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returned (enumeration-safe)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: If this email is registered, a reset link has been sent.

  /auth/reset-password:
    post:
      operationId: postAuthResetPassword
      tags: [auth]
      summary: Set a new password using a reset token
      description: >
        Accepts the signed token from the reset email and sets a new password.
        Token is single-use and short-lived.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [reset]
                    properties:
                      reset:
                        type: boolean
                        example: true
        '400':
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid reset token
                status: 400
                detail: The reset token is invalid or has expired.
                code: INVALID_RESET_TOKEN
        '422':
          description: Validation error (e.g. weak password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Candidate: profile ────────────────────────────────────────────────────────
  /candidates/me:
    get:
      operationId: getCandidateMe
      tags: [candidate]
      summary: Get the authenticated candidate's profile (self-view)
      description: >
        Returns the full profile including phone and religion regardless of privacy
        toggles, since this is the candidate's own data.
      responses:
        '200':
          description: Candidate profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/CandidateProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      operationId: patchCandidateMe
      tags: [candidate]
      summary: Update personal info fields
      description: >
        Partial update of editable personal-info fields. Returns the updated
        full profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                fatherName:
                  type: string
                dob:
                  type: string
                  format: date
                maritalStatus:
                  $ref: '#/components/schemas/MaritalStatus'
                religion:
                  type: string
                languages:
                  type: array
                  items:
                    type: string
                jobCategoryId:
                  type: string
                  format: uuid
                currentLocation:
                  type: string
                nationality:
                  type: string
                noticePeriod:
                  type: integer
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/CandidateProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Candidate: completion ─────────────────────────────────────────────────────
  /candidates/me/completion:
    get:
      operationId: getCandidateMeCompletion
      tags: [candidate]
      summary: Get profile completion breakdown
      description: >
        Returns server-computed completion percentage, per-section breakdown, and
        whether the candidate passes the apply gate. The gate is enforced at apply
        time (Sprint 4), not here.
      responses:
        '200':
          description: Completion result
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/CompletionResult'

  # ── Candidate: settings ───────────────────────────────────────────────────────
  /candidates/me/settings:
    patch:
      operationId: patchCandidateMeSettings
      tags: [candidate]
      summary: Update candidate privacy and notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                showPhone:
                  type: boolean
                showReligion:
                  type: boolean
                waNotifications:
                  type: boolean
                emailNotifs:
                  type: boolean
                profileVisible:
                  type: boolean
                isAvailable:
                  type: boolean
                salaryExpectationMin:
                  type: integer
                salaryExpectationMax:
                  type: integer
                salaryExpectationCurrency:
                  type: string
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/CandidateProfile'

  # ── Candidate: experiences ────────────────────────────────────────────────────
  /candidates/me/experiences:
    post:
      operationId: postCandidateMeExperiences
      tags: [candidate]
      summary: Add a work experience entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  $ref: '#/components/schemas/ExperienceType'
                country:
                  type: string
                companyName:
                  type: string
                role:
                  type: string
                years:
                  type: integer
                  minimum: 0
                months:
                  type: integer
                  minimum: 0
                  maximum: 11
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        '201':
          description: Experience created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/WorkExperience'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /candidates/me/experiences/{id}:
    patch:
      operationId: patchCandidateMeExperienceById
      tags: [candidate]
      summary: Update a work experience entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  $ref: '#/components/schemas/ExperienceType'
                country:
                  type: string
                companyName:
                  type: string
                role:
                  type: string
                years:
                  type: integer
                months:
                  type: integer
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        '200':
          description: Updated experience
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/WorkExperience'
        '404':
          description: Experience not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteCandidateMeExperienceById
      tags: [candidate]
      summary: Delete a work experience entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Candidate: skills ─────────────────────────────────────────────────────────
  /candidates/me/skills:
    post:
      operationId: postCandidateMeSkills
      tags: [candidate]
      summary: Add a skill
      description: >
        Only the first 3 skills contribute to the match score. Additional skills
        beyond 3 are stored but do not increase the score.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Skill added
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/CandidateSkill'

  /candidates/me/skills/{id}:
    delete:
      operationId: deleteCandidateMeSkillById
      tags: [candidate]
      summary: Remove a skill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Candidate: documents ──────────────────────────────────────────────────────
  /candidates/me/documents/presign:
    post:
      operationId: postCandidateMeDocumentsPresign
      tags: [candidate]
      summary: Get a presigned R2 upload URL
      description: |
        Issues a short-lived presigned PUT URL for direct R2 upload.

        **Accepted types and size limits:**
        - `PASSPORT`: 10 MB max; image/jpeg, image/png, application/pdf
        - `EXPERIENCE_CERT`: 5 MB max; application/pdf
        - `EDUCATIONAL_CERT`: 5 MB max; application/pdf

        `WORKING_VIDEO` is Phase 2 only — not accepted at MVP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, fileName, mimeType, sizeBytes]
              properties:
                type:
                  $ref: '#/components/schemas/DocumentType'
                fileName:
                  type: string
                  example: passport.pdf
                mimeType:
                  type: string
                  example: application/pdf
                sizeBytes:
                  type: integer
      responses:
        '200':
          description: Presigned URL ready
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [uploadUrl, key, expiresInSeconds]
                    properties:
                      uploadUrl:
                        type: string
                        format: uri
                      key:
                        type: string
                      expiresInSeconds:
                        type: integer
                        example: 300
        '422':
          description: Invalid file type or size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /candidates/me/documents/confirm:
    post:
      operationId: postCandidateMeDocumentsConfirm
      tags: [candidate]
      summary: Confirm an uploaded document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                expiryDate:
                  type: string
                  format: date
                  description: Required for PASSPORT type
      responses:
        '200':
          description: Document recorded
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/CandidateDocument'
        '422':
          description: Upload not found (HEAD check failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Upload not found
                status: 422
                detail: The uploaded file was not found in storage. Please try uploading again.
                code: UPLOAD_NOT_FOUND

  # ── Candidate: complete onboarding ────────────────────────────────────────────
  /candidates/me/complete-onboarding:
    post:
      operationId: postCandidateMeCompleteOnboarding
      tags: [candidate]
      summary: Mark onboarding as complete
      description: |
        **SOFT-BLOCK:** Succeeds even if mandatory documents are missing or
        completion is below the apply threshold. The apply gate is enforced at
        job-apply time (Sprint 4), not here.
      responses:
        '200':
          description: Onboarding marked complete
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [completionPct]
                    properties:
                      completionPct:
                        type: integer
                        minimum: 0
                        maximum: 100

  # ── Candidate: notifications (S2) ────────────────────────────────────────────
  /candidates/me/notifications:
    get:
      operationId: getCandidateMeNotifications
      tags: [notifications]
      summary: Get the candidate's in-app notifications (cursor-paginated)
      description: |
        Returns cursor-paginated notifications for the authenticated candidate.

        **Filter categories:**
        - `applications` — APPLICATION_UPDATE type
        - `jobs` — JOB_MATCH type
        - `profile` — PROFILE_REMINDER and DOCUMENT_STATUS types
        - `system` — SYSTEM type
        - (omit `filter`) — all types

        `unread=true` restricts to unread notifications only.
      parameters:
        - name: filter
          in: query
          description: Notification category filter
          schema:
            type: string
            enum: [applications, jobs, profile, system]
        - name: unread
          in: query
          description: If true, return only unread notifications
          schema:
            type: boolean
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Cursor-paginated notifications
          content:
            application/json:
              schema:
                type: object
                required: [data, nextCursor]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  nextCursor:
                    type: [string, "null"]
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /candidates/me/notifications/read:
    post:
      operationId: postCandidateMeNotificationsRead
      tags: [notifications]
      summary: Mark notifications as read
      description: >
        Marks specific notifications (by `ids`) or all notifications (`all: true`)
        as read. If both are provided, `all` takes precedence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Specific notification IDs to mark read
                all:
                  type: boolean
                  description: If true, mark every notification as read
      responses:
        '200':
          description: Notifications marked as read
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [markedCount]
                    properties:
                      markedCount:
                        type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Account: self-deletion ────────────────────────────────────────────────────
  /account:
    delete:
      operationId: deleteAccount
      tags: [candidate]
      summary: Request account deletion
      description: |
        Sets the account status to `PENDING_DELETION` and schedules a 30-day
        purge job. Returns the deletion due date.

        Financial records and `audit_logs` are never cascade-deleted per the
        platform invariants.
      responses:
        '202':
          description: Deletion scheduled
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [deletionDueAt]
                    properties:
                      deletionDueAt:
                        type: string
                        format: date-time

  # ── Resume ────────────────────────────────────────────────────────────────────
  /candidates/me/resume:
    get:
      operationId: getCandidateMeResume
      tags: [resume]
      summary: Get resume settings and last-rendered timestamp
      responses:
        '200':
          description: Resume info
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [settings]
                    properties:
                      settings:
                        $ref: '#/components/schemas/ResumeSettings'
                      lastRenderedAt:
                        type: [string, "null"]
                        format: date-time

  /candidates/me/resume/settings:
    patch:
      operationId: patchCandidateMeResumeSettings
      tags: [resume]
      summary: Update resume rendering settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeSettings'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ResumeSettings'

  /candidates/me/resume/generate:
    post:
      operationId: postCandidateMeResumeGenerate
      tags: [resume]
      summary: Enqueue a resume PDF generation
      responses:
        '202':
          description: Generation enqueued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [generationId]
                    properties:
                      generationId:
                        type: string
                        format: uuid

  /candidates/me/resume/download:
    get:
      operationId: getCandidateMeResumeDownload
      tags: [resume]
      summary: Get a signed download URL for the candidate's resume PDF
      responses:
        '200':
          description: Signed download URL
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [url, expiresInSeconds]
                    properties:
                      url:
                        type: string
                        format: uri
                      expiresInSeconds:
                        type: integer
                        example: 300
        '404':
          description: No resume generated yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /candidates/me/resume/send-whatsapp:
    post:
      operationId: postCandidateMeResumeSendWhatsapp
      tags: [resume]
      summary: Send resume PDF via WhatsApp to the candidate
      description: |
        Rate-limited: 5 sends / day / candidate.
        **409 WHATSAPP_NOT_CAPABLE** — candidate's `whatsappCapable = false`.
      responses:
        '202':
          description: Send enqueued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [sent]
                    properties:
                      sent:
                        type: boolean
        '409':
          description: Candidate is not WhatsApp capable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: WhatsApp not capable
                status: 409
                detail: This account is not linked to a WhatsApp number. Please use email delivery.
                code: WHATSAPP_NOT_CAPABLE
        '429':
          description: Daily send limit reached (5/day)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /candidates/me/resume/send-email:
    post:
      operationId: postCandidateMeResumeSendEmail
      tags: [resume]
      summary: Send resume PDF via email to the candidate
      description: |
        Sends to the candidate's own registered account email ONLY — no `to`
        field is accepted. Rate-limited: 5 sends / day.
      responses:
        '202':
          description: Email enqueued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [sent]
                    properties:
                      sent:
                        type: boolean
        '429':
          description: Daily send limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ══════════════════════════════════════════════════════════════════════════════
  # EMPLOYER — S2 FULL DETAIL
  # ══════════════════════════════════════════════════════════════════════════════

  /employers/register:
    post:
      operationId: postEmployersRegister
      tags: [employer]
      summary: Register employer company profile
      description: |
        Registers the employer's company details after account creation.
        The company starts with status PENDING and must be approved by an admin
        before the employer can post jobs.

        **Requires EMPLOYER role.** CANDIDATE callers receive 403 FORBIDDEN.
        Only one company per employer account — 409 COMPANY_ALREADY_EXISTS if
        the employer has already registered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, phone, location, employeeRange]
              properties:
                name:
                  type: string
                type:
                  $ref: '#/components/schemas/CompanyType'
                registrationNumber:
                  type: string
                industryType:
                  type: string
                phone:
                  type: string
                location:
                  type: string
                website:
                  type: string
                  format: uri
                employeeRange:
                  $ref: '#/components/schemas/EmployeeRange'
                languagePref:
                  type: string
                  enum: [en, hi, ar]
                  default: en
                description:
                  type: string
      responses:
        '201':
          description: Company profile created (status PENDING)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Company'
        '403':
          description: Caller is not an EMPLOYER role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Forbidden
                status: 403
                detail: Only EMPLOYER role users may register a company.
                code: FORBIDDEN
        '409':
          description: Company already registered for this account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Company already registered
                status: 409
                detail: This employer account already has a registered company profile.
                code: COMPANY_ALREADY_EXISTS
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /employers/me/company:
    get:
      operationId: getEmployersMeCompany
      tags: [employer]
      summary: Get the authenticated employer's company profile
      responses:
        '200':
          description: Company profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Company'
        '404':
          description: No company profile registered yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Not found
                status: 404
                detail: No company profile found. Use POST /employers/register first.
                code: NOT_FOUND
    patch:
      operationId: patchEmployersMeCompany
      tags: [employer]
      summary: Update the authenticated employer's company profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                registrationNumber:
                  type: string
                industryType:
                  type: string
                phone:
                  type: string
                location:
                  type: string
                website:
                  type: string
                  format: uri
                employeeRange:
                  $ref: '#/components/schemas/EmployeeRange'
                languagePref:
                  type: string
                  enum: [en, hi, ar]
                description:
                  type: string
      responses:
        '200':
          description: Updated company profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Company'
        '404':
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /employers/me/company/documents/presign:
    post:
      operationId: postEmployersMeCompanyDocumentsPresign
      tags: [employer]
      summary: Get a presigned R2 URL to upload the registration certificate
      description: |
        Issues a short-lived presigned PUT URL for direct R2 upload of the
        registration certificate. After upload, call
        `POST /employers/me/company/documents/confirm` with the returned `key`.

        Accepted: application/pdf, image/jpeg, image/png. Max 10 MB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, mimeType, sizeBytes]
              properties:
                fileName:
                  type: string
                  example: registration-cert.pdf
                mimeType:
                  type: string
                  example: application/pdf
                sizeBytes:
                  type: integer
      responses:
        '200':
          description: Presigned URL ready
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [uploadUrl, key, expiresInSeconds]
                    properties:
                      uploadUrl:
                        type: string
                        format: uri
                      key:
                        type: string
                      expiresInSeconds:
                        type: integer
                        example: 300
        '422':
          description: Invalid file type or exceeds 10 MB limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /employers/me/company/documents/confirm:
    post:
      operationId: postEmployersMeCompanyDocumentsConfirm
      tags: [employer]
      summary: Confirm the uploaded registration certificate
      description: |
        After PUT to the presigned URL succeeds, call this to record the
        certificate key on the company profile. The API performs a HEAD check;
        returns 422 UPLOAD_NOT_FOUND if the object is missing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                  description: R2 key returned by the presign endpoint
      responses:
        '200':
          description: Certificate recorded on company profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Company'
        '404':
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Upload not found (HEAD check failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Upload not found
                status: 422
                detail: The uploaded file was not found in storage. Please try uploading again.
                code: UPLOAD_NOT_FOUND

  /employers/me/dashboard:
    get:
      operationId: getEmployersMeDashboard
      tags: [employer]
      summary: Get the employer's dashboard summary (Screen 15)
      description: |
        Returns KPIs (active jobs, total applications, shortlisted, selected)
        and the most recent jobs and applicants.

        `recentApplicants` uses employer-context viewer-aware DTO masking:
        phone and religion are omitted based on candidate privacy toggles.

        **403 EMPLOYER_NOT_APPROVED** if the company status is not APPROVED.
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/EmployerDashboard'
        '403':
          description: Company not yet approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Employer not approved
                status: 403
                detail: Your company profile is pending admin approval.
                code: EMPLOYER_NOT_APPROVED
        '404':
          description: No company profile registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /employers/me/jobs:
    get:
      operationId: getEmployersMeJobs
      tags: [employer]
      summary: List the employer's job postings — offset-paginated (Screen 17)
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/JobStatus'
        - name: search
          in: query
          description: Title keyword search
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated list of the employer's jobs (full Job schema)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  meta:
                    type: object
                    required: [page, pageSize, total, totalPages]
                    properties:
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer

  # ══════════════════════════════════════════════════════════════════════════════
  # JOBS — S2 FULL DETAIL
  # ══════════════════════════════════════════════════════════════════════════════

  /jobs:
    get:
      operationId: getJobs
      tags: [jobs]
      summary: Browse active job listings (public, SSR-crawlable, cursor-paginated)
      description: |
        **PUBLIC endpoint — no authentication required.** Returns only ACTIVE jobs.

        **FTS + trigram behavior:** `q` performs full-text search on title and
        description. `sort=relevance` ranks by FTS rank then `publishedAt` desc.
        `sort=recent` orders by `publishedAt` desc. `sort=salary` orders by
        `salaryMax` desc (nulls last).

        **Cursor pagination:** pass `nextCursor` from the previous response as
        `cursor` in the next request. `nextCursor = null` means no more results.

        `isSaved` is populated for authenticated candidate callers; null for
        unauthenticated (SSR / crawler) requests.
      security: []
      parameters:
        - name: market
          in: query
          schema:
            $ref: '#/components/schemas/JobMarket'
        - name: category
          in: query
          description: Filter by job category ID
          schema:
            type: string
            format: uuid
        - name: salaryMin
          in: query
          description: Minimum salary filter (inclusive)
          schema:
            type: integer
            minimum: 0
        - name: salaryMax
          in: query
          description: Maximum salary filter (inclusive)
          schema:
            type: integer
            minimum: 0
        - name: currency
          in: query
          description: Filter by salary currency (e.g. AED, INR)
          schema:
            type: string
        - name: badge
          in: query
          description: >
            Benefit badge filter — returns only jobs where the named benefit is true.
            Accepted: accommodation, healthInsurance, transportation.
          schema:
            type: string
            enum: [accommodation, healthInsurance, transportation]
        - name: q
          in: query
          description: Full-text / trigram search query (title + description)
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, recent, salary]
            default: recent
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Cursor-paginated list of job cards
          content:
            application/json:
              schema:
                type: object
                required: [data, nextCursor]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JobCard'
                  nextCursor:
                    type: [string, "null"]

    post:
      operationId: postJobs
      tags: [jobs]
      summary: Create a new job posting as DRAFT (approved employer)
      description: |
        Creates a new job in DRAFT status. Not publicly visible until published.

        **Requires EMPLOYER role with an APPROVED company.** Returns 403
        EMPLOYER_NOT_APPROVED if the company is PENDING, REJECTED, or SUSPENDED.

        **Publish-time rules (NOT enforced at create — documented here for reference):**
        1. EMPLOYER_NOT_APPROVED (403) — enforced at publish only if company status changes.
        2. WORKER_PROTECTION_VIOLATION (422) — accommodation, healthInsurance, and
           transportation must all be `true`. `meta.violations[]` lists which rules failed.
        3. JOB_QUOTA_EXCEEDED (422) — Free plan: max 1 ACTIVE job. `meta.planLimit = 1`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, market, location, salaryCurrency, accommodation, healthInsurance, transportation]
              properties:
                title:
                  type: string
                market:
                  $ref: '#/components/schemas/JobMarket'
                location:
                  type: string
                description:
                  type: string
                categoryId:
                  type: string
                  format: uuid
                salaryMin:
                  type: integer
                  minimum: 0
                salaryMax:
                  type: integer
                  minimum: 0
                salaryCurrency:
                  type: string
                  example: AED
                accommodation:
                  type: boolean
                healthInsurance:
                  type: boolean
                transportation:
                  type: boolean
                workConditions:
                  type: string
                requirements:
                  type: array
                  items:
                    type: string
                experienceRequiredYears:
                  type: integer
                  minimum: 0
                vacancies:
                  type: integer
                  minimum: 1
                genderPreference:
                  $ref: '#/components/schemas/GenderPreference'
      responses:
        '201':
          description: Job created (DRAFT)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Job'
        '403':
          description: Employer company not approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Employer not approved
                status: 403
                detail: Your company must be approved by an admin before posting jobs.
                code: EMPLOYER_NOT_APPROVED
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/{id}:
    get:
      operationId: getJobById
      tags: [jobs]
      summary: Get public job detail (SSR-crawlable)
      description: |
        **PUBLIC endpoint — no authentication required.** Returns the full detail
        for a single ACTIVE job, including description, requirements, and up to
        5 similar jobs.

        `isSaved` is populated for authenticated candidate callers; null for
        unauthenticated requests.

        **No `companyId` or internal/employer-PII fields are returned.**
        404 is returned for non-ACTIVE (draft, paused, archived) jobs.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/JobDetail'
        '404':
          description: Job not found or not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Not found
                status: 404
                detail: Job not found or is not currently active.
                code: NOT_FOUND

    patch:
      operationId: patchJobById
      tags: [jobs]
      summary: Update a job posting (owning employer)
      description: >
        Partial update of an employer's own job. Allowed on DRAFT, ACTIVE, and
        PAUSED jobs. ARCHIVED jobs are read-only — returns 422 ILLEGAL_TRANSITION.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                market:
                  $ref: '#/components/schemas/JobMarket'
                location:
                  type: string
                description:
                  type: string
                categoryId:
                  type: string
                  format: uuid
                salaryMin:
                  type: integer
                  minimum: 0
                salaryMax:
                  type: integer
                  minimum: 0
                salaryCurrency:
                  type: string
                accommodation:
                  type: boolean
                healthInsurance:
                  type: boolean
                transportation:
                  type: boolean
                workConditions:
                  type: string
                requirements:
                  type: array
                  items:
                    type: string
                experienceRequiredYears:
                  type: integer
                  minimum: 0
                vacancies:
                  type: integer
                  minimum: 1
                genderPreference:
                  $ref: '#/components/schemas/GenderPreference'
      responses:
        '200':
          description: Updated job
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Job'
        '403':
          description: Not the owning employer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: ARCHIVED job is read-only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid transition
                status: 422
                detail: Archived jobs are read-only and cannot be edited.
                code: ILLEGAL_TRANSITION

  /jobs/{id}/publish:
    post:
      operationId: publishJob
      tags: [jobs]
      summary: Publish a job posting (owning employer)
      description: |
        Moves a DRAFT or PAUSED job to ACTIVE status.

        **Enforcement order (first failure short-circuits):**

        1. **EMPLOYER_NOT_APPROVED (403)** — The employer's company must have
           `status = APPROVED`. PENDING, REJECTED, and SUSPENDED companies cannot
           publish.

        2. **WORKER_PROTECTION_VIOLATION (422)** — All three of `accommodation`,
           `healthInsurance`, and `transportation` must be `true`. Returns 422 with
           `meta.violations[]` listing which fields failed (e.g.
           `["accommodation", "healthInsurance"]`).

        3. **JOB_QUOTA_EXCEEDED (422)** — Free plan employers may have at most 1
           ACTIVE job at a time. Returns 422 with `meta.planLimit = 1` and
           `meta.activeCount = N`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job published (status ACTIVE)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Job'
        '403':
          description: Employer company not approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Employer not approved
                status: 403
                detail: Your company must be approved before publishing jobs.
                code: EMPLOYER_NOT_APPROVED
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Worker protection violation or quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                protectionViolation:
                  value:
                    type: about:blank
                    title: Worker protection violation
                    status: 422
                    detail: Job cannot be published — required worker benefits are missing.
                    code: WORKER_PROTECTION_VIOLATION
                    meta:
                      violations: [accommodation, transportation]
                quotaExceeded:
                  value:
                    type: about:blank
                    title: Job quota exceeded
                    status: 422
                    detail: Free plan allows 1 active job. Archive or pause your existing job first.
                    code: JOB_QUOTA_EXCEEDED
                    meta:
                      planLimit: 1
                      activeCount: 1

  /jobs/{id}/pause:
    post:
      operationId: pauseJob
      tags: [jobs]
      summary: Pause an active job (owning employer)
      description: >
        Moves an ACTIVE job to PAUSED status. Paused jobs are hidden from public
        search but can be resumed. Use archive for a permanent removal.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job paused
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Job is not in ACTIVE status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid transition
                status: 422
                detail: Only ACTIVE jobs can be paused.
                code: ILLEGAL_TRANSITION

  /jobs/{id}/resume:
    post:
      operationId: resumeJob
      tags: [jobs]
      summary: Resume a paused job (owning employer)
      description: >
        Moves a PAUSED job back to ACTIVE status. The same publish-time rules
        (worker protection + quota) are re-evaluated.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job resumed (ACTIVE)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Job is not PAUSED or publish rules fail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/{id}/archive:
    post:
      operationId: archiveJob
      tags: [jobs]
      summary: Archive a job (owning employer)
      description: >
        Moves a DRAFT, ACTIVE, or PAUSED job to ARCHIVED status. Archived jobs
        are permanently read-only and not visible in public search. This
        transition is permanent — use pause to temporarily hide an active job.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job archived
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Job is already ARCHIVED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid transition
                status: 422
                detail: Job is already archived.
                code: ILLEGAL_TRANSITION

  /jobs/{id}/duplicate:
    post:
      operationId: duplicateJob
      tags: [jobs]
      summary: Duplicate a job as a new DRAFT (owning employer)
      description: >
        Creates a new DRAFT job by copying all fields from the specified job.
        The new job starts in DRAFT status and must be published separately.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: New DRAFT job created from the copy
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Job'
        '404':
          description: Source job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/{id}/save:
    post:
      operationId: saveJob
      tags: [jobs]
      summary: Save a job (authenticated candidate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Job saved
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [saved]
                    properties:
                      saved:
                        type: boolean
                        example: true
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Job already saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Already saved
                status: 409
                detail: This job is already in your saved list.
                code: ALREADY_SAVED
    delete:
      operationId: unsaveJob
      tags: [jobs]
      summary: Unsave a job (authenticated candidate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Job unsaved
        '404':
          description: Job not found or not in saved list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ══════════════════════════════════════════════════════════════════════════════
  # ADMIN — S2: employer approval + settings
  # ══════════════════════════════════════════════════════════════════════════════

  /admin/employers:
    get:
      operationId: getAdminEmployers
      tags: [admin]
      summary: List all employer companies (admin, offset-paginated)
      description: >
        Returns offset-paginated list of all employer companies. Filterable by
        status and type. Requires admin bearer token.
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CompanyStatus'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/CompanyType'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated employer list
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Company'
                  meta:
                    type: object
                    required: [page, pageSize, total, totalPages]
                    properties:
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        '403':
          description: Insufficient admin permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/employers/{id}/approve:
    post:
      operationId: postAdminEmployerApprove
      tags: [admin]
      summary: Approve an employer company (admin)
      description: >
        Sets the employer's company status to APPROVED. After approval the
        employer can post jobs. Requires `employers.approve_reject` permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Employer approved
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Company'
        '404':
          description: Employer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/employers/{id}/reject:
    post:
      operationId: postAdminEmployerReject
      tags: [admin]
      summary: Reject an employer company (admin)
      description: >
        Sets the employer's company status to REJECTED. A `reason` is required
        and is visible to the employer via `Company.rejectionReason`. Requires
        `employers.approve_reject` permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Reason for rejection (shown to the employer)
      responses:
        '200':
          description: Employer rejected
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Company'
        '404':
          description: Employer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Reason is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/employers/{id}/suspend:
    post:
      operationId: postAdminEmployerSuspend
      tags: [admin]
      summary: Suspend an employer company (admin)
      description: >
        Sets the employer's company status to SUSPENDED. All their ACTIVE jobs
        are paused automatically. Requires `employers.approve_reject` permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Employer suspended
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Company'
        '404':
          description: Employer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get platform settings (admin)
      description: >
        Returns all platform settings grouped by SettingGroup (matches the tabs
        on Screen 28). Requires admin bearer token.
      responses:
        '200':
          description: All platform settings
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Setting'
        '403':
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: patchAdminSettings
      tags: [admin]
      summary: Update platform settings (admin; core rules require SUPER_ADMIN)
      description: |
        Updates one or more settings by key. Settings where `isCoreRule = true`
        (WORKER_PROTECTION group) require SUPER_ADMIN — ADMIN callers receive
        403 CORE_RULE_FORBIDDEN for those keys.

        Send only the keys to update; other settings remain unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [updates]
              properties:
                updates:
                  type: array
                  items:
                    type: object
                    required: [key, value]
                    properties:
                      key:
                        type: string
                      value:
                        description: New value (type depends on the setting key)
      responses:
        '200':
          description: Updated settings list (all settings, not just changed ones)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Setting'
        '403':
          description: ADMIN attempting to modify a core-rule setting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Core rule forbidden
                status: 403
                detail: Only SUPER_ADMIN may modify worker-protection core rules.
                code: CORE_RULE_FORBIDDEN
        '422':
          description: Unknown setting key or invalid value type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

