openapi: 3.1.0
info:
  title: SkillIndiaConnect API
  version: 0.1.0
  description: |
    Production blue-collar recruitment platform connecting skilled workers in India
    with employers in the Gulf and locally.

    **Contract freeze rule:** After the initial freeze merge, contract changes require
    a spec edit + `pnpm contract:generate` + a versioned amendment description in the
    commit / PR. Frontend and backend tracks build in parallel against this contract.

    **Base URL:** All versioned endpoints are under `/api/v1`. The `/health` endpoint
    is unversioned and served at the root (see path entry for details).

    **Auth:** JWT bearer token (`Authorization: Bearer <token>`). Access tokens are
    short-lived (15 min). Refresh tokens are delivered as an HttpOnly cookie
    (`sic_refresh`) via `POST /auth/refresh`. Public endpoints carry `security: []`.

servers:
  - url: /api/v1
    description: Versioned API

tags:
  - name: health
    description: Unversioned liveness/readiness probe
  - name: auth
    description: Authentication — email/password, Google OAuth, OTP login, password reset
  - name: candidate
    description: Candidate profile, onboarding, documents, and account management
  - name: resume
    description: Resume settings, generation, download, and delivery (built in Sprint 7)
  - name: employer
    description: Employer registration and company management (Sprint 3)
  - name: jobs
    description: Job listings, saving, applying (Sprint 2 / 4)
  - name: payments
    description: Billing plans, checkout, subscription (Sprint 5)
  - name: admin
    description: Admin dashboard, moderation, settings (Sprint 6)

security:
  - bearerAuth: []

# ─── Components ──────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Short-lived JWT access token issued by login / signup / OAuth / OTP-verify.
        Deliver in `Authorization: Bearer <token>`. Refresh via `POST /auth/refresh`
        (uses the `sic_refresh` HttpOnly cookie, not this header).

  parameters:
    CursorParam:
      name: cursor
      in: query
      description: Opaque keyset cursor for cursor-paginated feeds
      schema:
        type: string

    LimitParam:
      name: limit
      in: query
      description: Page size for cursor-paginated feeds (default 20, max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    PageParam:
      name: page
      in: query
      description: 1-based page number for offset-paginated admin tables
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      description: Items per page for offset-paginated admin tables (default 20, max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SortParam:
      name: sort
      in: query
      description: >
        Sort expression in the format `field:asc` or `field:desc`.
        Allowed fields are whitelisted per endpoint.
      schema:
        type: string
        pattern: '^[a-zA-Z]+:(asc|desc)$'

  schemas:

    # ── Error envelope (RFC 7807-style) ────────────────────────────────────────
    Error:
      type: object
      required: [type, title, status, detail, code]
      properties:
        type:
          type: string
          description: URI reference identifying the problem type
          example: about:blank
        title:
          type: string
          description: Human-readable summary (localizable)
          example: Email already registered
        status:
          type: integer
          description: HTTP status code
          example: 409
        detail:
          type: string
          description: Human-readable explanation (localizable)
          example: An account with this email address already exists.
        code:
          type: string
          description: >
            Machine-readable error code — the stable contract field.
            Examples: EMAIL_TAKEN, INVALID_CREDENTIALS, ACCOUNT_SUSPENDED,
            INVALID_OTP, PHONE_NOT_ON_WHATSAPP, PROFILE_INCOMPLETE,
            MANDATORY_DOCS_MISSING, ILLEGAL_TRANSITION, NOT_IMPLEMENTED.
          example: EMAIL_TAKEN
        meta:
          type: object
          description: >
            Additional context. Validation errors carry `meta.errors[]` with
            per-field machine codes.
          additionalProperties: true

    # ── Domain enums ────────────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [CANDIDATE, EMPLOYER, ADMIN, SUPER_ADMIN]

    UserStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, PENDING_DELETION]

    MaritalStatus:
      type: string
      enum: [SINGLE, MARRIED, DIVORCED, WIDOWED]

    ExperienceType:
      type: string
      enum: [INDIA, FOREIGN]

    DocumentType:
      type: string
      enum: [PASSPORT, EXPERIENCE_CERT, EDUCATIONAL_CERT]
      description: >
        Document types accepted at MVP. WORKING_VIDEO is deferred to Phase 2
        and MUST NOT be submitted via POST /candidates/me/documents/presign.

    DocumentStatus:
      type: string
      enum: [PENDING, VERIFIED, REJECTED]

    # ── Shared objects ──────────────────────────────────────────────────────────
    UserSummary:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    AuthTokenResponse:
      type: object
      required: [user, accessToken]
      description: >
        Returned on successful signup, email/password login, Google OAuth, and
        OTP login. The `accessToken` (JWT, 15 min) must be stored by the client.
        A long-lived refresh token is delivered as the `sic_refresh` HttpOnly
        cookie (path `/api/v1/auth`) — do NOT try to read or send it manually.
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: Short-lived JWT access token (15 min)

    # ── Candidate schemas ────────────────────────────────────────────────────────
    WorkExperience:
      type: object
      required: [id, type]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/ExperienceType'
        country:
          type: string
          example: UAE
        companyName:
          type: string
        role:
          type: string
        years:
          type: integer
          minimum: 0
        months:
          type: integer
          minimum: 0
          maximum: 11
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    CandidateSkill:
      type: object
      required: [id, name]
      description: >
        Only the first 3 skills contribute to the match score.
        More than 3 skills can be stored but additional ones do not score.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    CandidateDocument:
      type: object
      required: [id, type, key, status, uploadedAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/DocumentType'
        key:
          type: string
          description: R2 storage key — use signed download URLs; never expose raw keys to untrusted callers
        status:
          $ref: '#/components/schemas/DocumentStatus'
        uploadedAt:
          type: string
          format: date-time
        expiryDate:
          type: string
          format: date
          description: Passport expiry date (PASSPORT type only; set during confirm step)

    CandidateProfile:
      type: object
      required: [id, email, role]
      description: |
        Candidate profile shape. **Privacy rules (viewer-aware DTOs):**
        - `phone` is omitted in employer/admin contexts when `showPhone = false` (default off).
        - `religion` is omitted in employer/admin contexts when `showReligion = false` (default off).
        - Self-view (`GET /candidates/me`) always includes both fields regardless of toggles.
        - Internal application notes are NEVER serialized to employer or candidate contexts.
        - `passportNumber` is only in the PDF renderer context and only when `showPassportNumber = true`.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        fullName:
          type: string
        fatherName:
          type: string
        dob:
          type: string
          format: date
        phone:
          type: string
          description: Toggle-controlled in non-self contexts (showPhone). Always present in self-view.
          example: '+919876543210'
        phoneVerifiedAt:
          type: [string, "null"]
          format: date-time
        whatsappCapable:
          type: [boolean, "null"]
          description: Set to true when OTP verification succeeds via WhatsApp channel
        maritalStatus:
          $ref: '#/components/schemas/MaritalStatus'
        religion:
          type: string
          description: Toggle-controlled in non-self contexts (showReligion). Always present in self-view.
        languages:
          type: array
          items:
            type: string
        jobCategoryId:
          type: [string, "null"]
          format: uuid
        currentLocation:
          type: string
        nationality:
          type: string
        noticePeriod:
          type: integer
          description: Notice period in days
        completionPct:
          type: integer
          minimum: 0
          maximum: 100
          description: Server-computed, single-source profile completion percentage
        profileVisible:
          type: boolean
          default: true
        isAvailable:
          type: boolean
          default: true
        salaryExpectationMin:
          type: [integer, "null"]
        salaryExpectationMax:
          type: [integer, "null"]
        salaryExpectationCurrency:
          type: string
          default: INR
        experiences:
          type: array
          items:
            $ref: '#/components/schemas/WorkExperience'
        skills:
          type: array
          items:
            $ref: '#/components/schemas/CandidateSkill'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/CandidateDocument'
        status:
          $ref: '#/components/schemas/UserStatus'
        createdAt:
          type: string
          format: date-time

    CompletionSection:
      type: object
      required: [key, label, pct, complete]
      properties:
        key:
          type: string
        label:
          type: string
        pct:
          type: integer
          minimum: 0
          maximum: 100
        complete:
          type: boolean

    CompletionResult:
      type: object
      required: [pct, sections, canApply, missingForApply]
      description: >
        Server-computed, single-source profile completion. The `canApply` gate
        requires pct ≥ threshold AND all mandatory documents present AND passport
        not expired. This is enforced at apply time (Sprint 4), not at
        complete-onboarding time.
      properties:
        pct:
          type: integer
          minimum: 0
          maximum: 100
        sections:
          type: array
          items:
            $ref: '#/components/schemas/CompletionSection'
        canApply:
          type: boolean
        missingForApply:
          type: array
          items:
            type: string
          description: Human-readable list of items blocking the apply gate

    ResumeSettings:
      type: object
      description: >
        Resume PDF rendering settings. Hidden fields (showPassportNumber = false,
        showReligion = false) must be ABSENT FROM THE PDF BYTES, not merely hidden
        in preview. Enforced at PDF generation time (Sprint 7).
      properties:
        language:
          type: string
          default: en
          example: en
        showPhone:
          type: boolean
          default: true
        showReligion:
          type: boolean
          default: false
        showFatherName:
          type: boolean
          default: false
        showPassportNumber:
          type: boolean
          default: false

# ─── Paths ───────────────────────────────────────────────────────────────────

paths:

  # ── Health (unversioned — path is /health at root, NOT under /api/v1) ──────
  /health:
    servers:
      - url: /
        description: Root — health is unversioned
    get:
      operationId: getHealth
      tags: [health]
      summary: Liveness probe
      description: >
        Returns 200 when the API process is up. Used by load balancers and
        container orchestrators. No authentication required.
      security: []
      responses:
        '200':
          description: API process is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  # ── Auth: signup ─────────────────────────────────────────────────────────────
  /auth/signup:
    post:
      operationId: postAuthSignup
      tags: [auth]
      summary: Register a new user account
      description: >
        Creates a new CANDIDATE or EMPLOYER account with email + password.
        Returns an access token and sets the `sic_refresh` HttpOnly cookie.
        Rate-limited: 5 requests / 60 s per IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role, acceptedTerms]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: Must meet the strength policy (length, mixed case, digit/symbol)
                role:
                  type: string
                  enum: [CANDIDATE, EMPLOYER]
                acceptedTerms:
                  type: boolean
                  description: Must be true; request rejected if false
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/AuthTokenResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Email already registered
                status: 409
                detail: An account with this email already exists.
                code: EMAIL_TAKEN
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Validation failed
                status: 422
                detail: One or more fields are invalid.
                code: VALIDATION_ERROR
                meta:
                  errors:
                    - field: email
                      code: INVALID_EMAIL

  # ── Auth: login ──────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: postAuthLogin
      tags: [auth]
      summary: Email + password login
      description: >
        Authenticates with email and password. Returns an access token and sets
        the `sic_refresh` HttpOnly cookie. Rate-limited: 5 requests / 60 s per IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Bad credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid credentials
                status: 401
                detail: Email or password is incorrect.
                code: INVALID_CREDENTIALS
        '403':
          description: Account suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Account suspended
                status: 403
                detail: Your account has been suspended.
                code: ACCOUNT_SUSPENDED

  # ── Auth: Google OAuth ────────────────────────────────────────────────────────
  /auth/google:
    get:
      operationId: getAuthGoogle
      tags: [auth]
      summary: Initiate Google OAuth flow
      description: >
        Redirects the browser to Google's OAuth consent screen. Candidates only
        — employers and admins MUST use email/password.
        The callback URL is `GET /auth/google/callback`.
      security: []
      responses:
        '302':
          description: Redirect to Google OAuth

  /auth/google/callback:
    get:
      operationId: getAuthGoogleCallback
      tags: [auth]
      summary: Google OAuth callback
      description: |
        Handles the Google OAuth callback. On success:
        1. Sets the `sic_refresh` HttpOnly cookie.
        2. Redirects to `{WEB_APP_URL}/auth/callback` (no token in the URL).

        **Error codes:**
        - `GOOGLE_NOT_ALLOWED` (403) — the email is registered as employer/admin;
          redirected to the error page with `?error=GOOGLE_NOT_ALLOWED`.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to web app callback URL
        '403':
          description: Google sign-in not allowed for this email/role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Google sign-in not allowed
                status: 403
                detail: This email is registered as an employer or admin — use email/password.
                code: GOOGLE_NOT_ALLOWED

  # ── Auth: refresh ────────────────────────────────────────────────────────────
  /auth/refresh:
    post:
      operationId: postAuthRefresh
      tags: [auth]
      summary: Rotate the refresh token and issue a new access token
      description: >
        Reads the `sic_refresh` HttpOnly cookie. Issues a new access token and
        rotates the refresh token (old token is revoked). On TOKEN_REUSE, all
        sessions for the user are wiped (token-family rotation strategy).
      security: []
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [accessToken]
                    properties:
                      accessToken:
                        type: string
        '401':
          description: Refresh token missing, invalid, or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid:
                  value:
                    type: about:blank
                    title: Invalid refresh token
                    status: 401
                    detail: Refresh token is missing or expired.
                    code: INVALID_REFRESH
                reuse:
                  value:
                    type: about:blank
                    title: Token reuse detected
                    status: 401
                    detail: All sessions have been revoked due to suspected token theft.
                    code: TOKEN_REUSE

  # ── Auth: logout ─────────────────────────────────────────────────────────────
  /auth/logout:
    post:
      operationId: postAuthLogout
      tags: [auth]
      summary: Revoke the current session
      description: >
        Blacklists the current access token JTI (until expiry) and revokes the
        `sic_refresh` cookie. Clears the cookie from the response.
        Idempotent — always returns 204.
      responses:
        '204':
          description: Session revoked

  # ── Auth: OTP send (phone verification) ──────────────────────────────────────
  /auth/otp/send:
    post:
      operationId: postAuthOtpSend
      tags: [auth]
      summary: Send a phone-verification OTP
      description: |
        Sends a one-time password to the given phone number via WhatsApp for the
        purpose of **phone verification** during candidate onboarding
        (`purpose = PHONE_VERIFY`).

        **Rate limits (shared with `/auth/login/phone/start`):**
        - 5 sends / hour / phone number
        - Per-IP limit applies

        **409 PHONE_NOT_ON_WHATSAPP** — returned when the number is valid but
        not reachable via the WhatsApp channel. The client should prompt the user
        to try a different number or contact support.

        Note: the actual send budget and `purpose` enum are enforced by the
        backend (Sprint 1-1); this endpoint ALWAYS sends (unlike the
        enumeration-safe login/phone/start which may silently no-op).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  description: E.164 phone number
                  example: '+919876543210'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [sent]
                    properties:
                      sent:
                        type: boolean
                        example: true
        '409':
          description: Phone number is not reachable via WhatsApp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Phone not on WhatsApp
                status: 409
                detail: This number is not reachable via WhatsApp. Please try a different number.
                code: PHONE_NOT_ON_WHATSAPP
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Too many requests
                status: 429
                detail: OTP send limit reached. Try again in an hour.
                code: RATE_LIMIT_EXCEEDED

  # ── Auth: OTP verify (phone verification) ────────────────────────────────────
  /auth/otp/verify:
    post:
      operationId: postAuthOtpVerify
      tags: [auth]
      summary: Verify the phone-verification OTP
      description: |
        Verifies a `purpose = PHONE_VERIFY` OTP for the caller's candidate profile.
        On success, sets `phoneVerifiedAt` and `whatsappCapable` on the candidate row.

        Requires a valid access token (the candidate must be logged in to verify
        their own phone number during onboarding).

        **401 INVALID_OTP** covers: wrong OTP, expired OTP, and maximum-attempts exceeded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone:
                  type: string
                  description: Must match the phone sent in /auth/otp/send
                  example: '+919876543210'
                otp:
                  type: string
                  description: 6-digit OTP received via WhatsApp
                  example: '123456'
      responses:
        '200':
          description: Phone verified
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [phoneVerified, whatsappCapable]
                    properties:
                      phoneVerified:
                        type: boolean
                        example: true
                      whatsappCapable:
                        type: boolean
                        example: true
        '401':
          description: Invalid, expired, or over-attempted OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid OTP
                status: 401
                detail: OTP is incorrect, expired, or too many attempts.
                code: INVALID_OTP

  # ── Auth: OTP login — start (enumeration-safe) ───────────────────────────────
  /auth/login/phone/start:
    post:
      operationId: postAuthLoginPhoneStart
      tags: [auth]
      summary: Start OTP-based phone login
      description: |
        Initiates OTP-based login for an existing candidate account.

        **ENUMERATION-SAFE: this endpoint ALWAYS returns 200 regardless of whether
        a verified candidate exists for the phone number.** This prevents callers from
        inferring whether a phone number has an account.

        Internal behavior (not visible to callers):
        - If a CANDIDATE user with a VERIFIED phone matching `phone` exists → sends a
          `purpose = LOGIN` OTP via WhatsApp.
        - If the phone belongs to a non-candidate, an unverified candidate, or is
          unknown → silently no-ops (no OTP sent, same 200 response).

        **OTP login is for existing candidates only. It never creates accounts.**
        There is no phone-signup endpoint.

        **Rate limits (shared with `/auth/otp/send`):**
        - 5 sends / hour / phone number
        - Per-IP limit applies

        The 200 body is identical regardless of whether an OTP was actually sent,
        so the client MUST NOT branch on the response body.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  description: E.164 phone number to log in with
                  example: '+919876543210'
      responses:
        '200':
          description: >
            Always returned (enumeration-safe). An OTP was sent only if a verified
            candidate account exists for this phone — the response body does not
            distinguish the two cases.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: If an account exists, an OTP has been sent.
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Too many requests
                status: 429
                detail: OTP send limit reached. Try again in an hour.
                code: RATE_LIMIT_EXCEEDED

  # ── Auth: OTP login — verify ──────────────────────────────────────────────────
  /auth/login/phone/verify:
    post:
      operationId: postAuthLoginPhoneVerify
      tags: [auth]
      summary: Verify OTP and issue tokens for phone login
      description: |
        Verifies a `purpose = LOGIN` OTP and, on success, issues an access token
        and sets the `sic_refresh` HttpOnly cookie — the identical rotation/
        blacklist path used by email/password and Google OAuth login.

        **Candidates only.** Non-candidate callers always receive 401 INVALID_OTP
        (to preserve enumeration safety).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone:
                  type: string
                  example: '+919876543210'
                otp:
                  type: string
                  example: '123456'
      responses:
        '200':
          description: OTP verified — tokens issued
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Invalid, expired, or over-attempted OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid OTP
                status: 401
                detail: OTP is incorrect, expired, or too many attempts.
                code: INVALID_OTP

  # ── Auth: password reset ──────────────────────────────────────────────────────
  /auth/forgot-password:
    post:
      operationId: postAuthForgotPassword
      tags: [auth]
      summary: Request a password-reset link
      description: |
        Sends a password-reset link to the email via AWS SES — **if the email
        exists**. Always returns 200 regardless (enumeration-safe). The reset link
        embeds a short-lived signed token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: >
            Always returned (enumeration-safe). A reset email was sent only if
            the email has a matching account.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: If this email is registered, a reset link has been sent.

  /auth/reset-password:
    post:
      operationId: postAuthResetPassword
      tags: [auth]
      summary: Set a new password using a reset token
      description: >
        Accepts the signed token from the reset email and sets a new password.
        Token is single-use and short-lived.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                  description: Signed reset token from the email link
                password:
                  type: string
                  minLength: 8
                  description: New password; must meet the strength policy
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [reset]
                    properties:
                      reset:
                        type: boolean
                        example: true
        '400':
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Invalid reset token
                status: 400
                detail: The reset token is invalid or has expired.
                code: INVALID_RESET_TOKEN
        '422':
          description: Validation error (e.g. weak password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: about:blank
                title: Validation failed
                status: 422
                detail: Password does not meet the strength requirements.
                code: VALIDATION_ERROR

  # ── Candidate: profile ────────────────────────────────────────────────────────
  /candidates/me:
    get:
      operationId: getCandidateMe
      tags: [candidate]
      summary: Get the authenticated candidate's profile (self-view)
      description: >
        Returns the full profile including phone and religion regardless of privacy
        toggles, since this is the candidate's own data. See CandidateProfile schema
        for non-self privacy rules.
      responses:
        '200':
          description: Candidate profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/CandidateProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      operationId: patchCandidateMe
