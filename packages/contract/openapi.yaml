                currentLocation:
                  type: string
                nationality:
                  type: string
                noticePeriod:
                  type: integer
                  description: Notice period in days
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/CandidateProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Candidate: completion ─────────────────────────────────────────────────────
  /candidates/me/completion:
    get:
      operationId: getCandidateMeCompletion
      tags: [candidate]
      summary: Get profile completion breakdown
      description: >
        Returns server-computed completion percentage, per-section breakdown, and
