        Partial update of editable personal-info fields. Returns the updated
        full profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                fatherName:
                  type: string
                dob:
                  type: string
